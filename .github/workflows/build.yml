name: Build & Deploy HeWork iOS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build HeWork IPA
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.4'

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Lint Swift Code
        run: |
          cd HeWork
          swiftlint lint --quiet --reporter github-actions-logging || true

      - name: Build iOS App
        run: |
          cd HeWork
          xcodebuild build \
            -project HeWork.xcodeproj \
            -scheme HeWork \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            | xcpretty --color || true

      - name: Archive IPA
        run: |
          cd HeWork
          xcodebuild archive \
            -project HeWork.xcodeproj \
            -scheme HeWork \
            -archivePath build/HeWork.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            | xcpretty --color || true

      - name: Export IPA
        run: |
          mkdir -p export_options
          cat > export_options/ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>development</string>
              <key>signingStyle</key>
              <string>automatic</string>
          </dict>
          </plist>
          EOF

          cd HeWork
          xcodebuild -exportArchive \
            -archivePath build/HeWork.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist ../export_options/ExportOptions.plist \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --color || true

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: HeWork.ipa
          path: HeWork/build/ipa/*.ipa
          retention-days: 30

  deploy-server:
    name: Deploy Backend Server
    runs-on: ubuntu-latest
    needs: []
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package.json

      - name: Install Dependencies
        run: |
          cd server
          npm install

      - name: Run Server Tests
        run: |
          cd server
          npm test || echo "No tests configured yet"
