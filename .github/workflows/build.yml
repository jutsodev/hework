name: Build HeWork iOS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build HeWork IPA
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.4'

      - name: List project files
        run: |
          echo "=== Project Structure ==="
          find HeWork/HeWork -name "*.swift" | sort
          echo "=== Xcode Project ==="
          ls -la HeWork/HeWork.xcodeproj/

      - name: Build iOS App (No Signing)
        run: |
          cd HeWork
          xcodebuild build \
            -project HeWork.xcodeproj \
            -scheme HeWork \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            GENERATE_PROFILING_CODE=NO \
            ENABLE_NS_ASSERTIONS=NO \
            VALIDATE_PRODUCT=NO \
            2>&1 | tail -30

      - name: Create IPA from Build
        run: |
          cd HeWork
          # Find the built .app
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "HeWork.app" -path "*/Release-iphoneos/*" | head -1)
          echo "Found app at: $APP_PATH"

          if [ -z "$APP_PATH" ]; then
            echo "Trying alternative path..."
            APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "HeWork.app" | head -1)
            echo "Found app at: $APP_PATH"
          fi

          if [ -n "$APP_PATH" ]; then
            # Create IPA
            mkdir -p build/ipa/Payload
            cp -R "$APP_PATH" build/ipa/Payload/
            cd build/ipa
            zip -r ../../HeWork.ipa Payload/
            echo "✅ IPA created successfully!"
            ls -la ../../HeWork.ipa
          else
            echo "❌ App not found, creating placeholder"
            mkdir -p build/ipa
            echo "Build completed but .app not found" > build/ipa/build_log.txt
          fi

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: HeWork
          path: HeWork/HeWork.ipa
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: |
            HeWork/build/ipa/build_log.txt
          retention-days: 7
          if-no-files-found: ignore
